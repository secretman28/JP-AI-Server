services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: jp-valkey
    restart: unless-stopped
    volumes:
      - /mnt/AI/docker/searxng/valkey:/data

  searxng:
    image: searxng/searxng:latest
    container_name: jp-searxng
    restart: unless-stopped
    depends_on:
      - valkey
    ports:
      - "8080:8080"
    volumes:
      - /mnt/AI/docker/searxng/config:/etc/searxng

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: jp-open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - searxng
    volumes:
      - /mnt/AI/docker/open-webui:/app/backend/data
    environment:
      - WEBUI_NAME=JP AI Server
      - OPENAI_API_BASE_URL=http://host.docker.internal:11434/v1
      - OPENAI_API_KEY=local
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
